# Test configuration — uses an in-memory H2 database so the Spring
# context loads without any external Supabase connection or env vars.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Connect instantly; no Supabase wake-up retry loop during tests
spring.datasource.hikari.connection-timeout=2000

spring.thymeleaf.cache=false
gemini.api.key=test-key
gemini.api.model=gemini-1.5-flash
gemini.api.base-url=https://example.invalid/models
gemini.api.connect-timeout-ms=1000
gemini.api.read-timeout-ms=1000

logging.level.org.springframework.web=WARN
logging.level.kaasu_creator=WARN
