spring.application.name=kaasu-creator
# Render sets PORT automatically; fallback to 9093 for local dev
server.port=${PORT:9093}

# ── Supabase PostgreSQL ──────────────────────────────────────────
# Direct host (IPv6 only — use pooler for IPv4-compatible local dev)
# Pooler (Session mode, IPv4, all JDBC features work):
#   host: aws-1-us-east-1.pooler.supabase.com  port: 5432  user: postgres.<project-ref>
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool — tuned for Supabase free tier (pauses after inactivity)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
# Don't fail on startup if Supabase is paused — connect in background
spring.datasource.hikari.initialization-fail-timeout=-1
# Give Supabase up to 60 s to wake up before throwing on a request
spring.datasource.hikari.connection-timeout=8000
# Ping idle connections every 60 s so they don't go stale
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Disable Spring Boot's auto SQL initialization (DatabaseInitializer handles it)
spring.sql.init.mode=never

# Thymeleaf — cache off in dev, Render sets THYMELEAF_CACHE=true via env
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# Gemini AI API — get a free key at https://aistudio.google.com
gemini.api.key=${GEMINI_API_KEY:}

# Error page — never leak stacktraces by default; override locally if needed
server.error.include-message=${ERROR_INCLUDE_MESSAGE:never}
server.error.include-stacktrace=${ERROR_INCLUDE_STACKTRACE:never}

# Logging — INFO by default; raise to DEBUG locally via env override
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.kaasu_creator=${LOG_LEVEL_APP:INFO}
