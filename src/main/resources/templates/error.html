<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Oops - Kaasu Creator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="login-right" style="margin: auto;">
        <div class="login-box" style="text-align: center;">
            <div class="login-brand-icon" style="font-size: 3rem;">😿</div>
            <h1>Something went wrong</h1>
            <p>Kaasu-chan tripped over a wire. The error has been logged and we are on it.</p>
            <p th:if="${path}" style="opacity: 0.6; font-size: 0.85rem;">
                Path: <span th:text="${path}">/</span>
            </p>
            <a href="/dashboard" class="btn">Back to dashboard</a>
        </div>
    </div>
</body>
</html>
